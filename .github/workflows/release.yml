name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.target_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target_name: windows-x86_64
            output_name: systems_catalog.exe
            asset_name: systems_catalog-windows-x86_64.exe
          - os: ubuntu-latest
            target_name: linux-x86_64
            output_name: systems_catalog
            asset_name: systems_catalog-linux-x86_64
          - os: macos-latest
            target_name: macos-aarch64
            output_name: systems_catalog
            asset_name: systems_catalog-macos-aarch64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Stage release asset
        shell: bash
        run: |
          mkdir -p dist
          cp "target/release/${{ matrix.output_name }}" "dist/${{ matrix.asset_name }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    name: create-release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/**
